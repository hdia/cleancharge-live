name: CleanCharge Live Daily Update

on:
  workflow_dispatch:

  schedule:
    - cron: '15 23 * * *'

permissions:
  contents: write

concurrency:
  group: cleancharge-live-daily-update
  cancel-in-progress: false

jobs:
  update:
    name: Run daily pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      OPENELECTRICITY_API_KEY: ${{ secrets.OPENELECTRICITY_API_KEY }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CleanCharge Live pipeline
        run: python run_daily_pipeline.py

      - name: Show generated changes
        run: git status --short

      - name: Commit and push updated operational outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/live

          if git diff --cached --quiet; then
            echo "No operational changes to commit."
            exit 0
          fi

          git commit -m "Automated CleanCharge Live update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:main
